services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-assetmaster}
      POSTGRES_USER: ${DB_USERNAME:-assetmaster}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-assetmaster}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-assetmaster}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-assetmaster}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-assetmaster_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Uncomment after Phase 1 (backend Docker image is built)
  # backend:
  #   build: ./backend
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     DB_HOST: db
  #     DB_NAME: ${DB_NAME:-assetmaster}
